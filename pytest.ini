[pytest]
# Garante que "import app.xxx" funcione dentro de tests/conftest.py e de
# qualquer arquivo de teste futuro, independente de o pytest ser chamado
# como `pytest` ou `python -m pytest`, e independente de haver ou não
# __init__.py em tests/. Sem isso, o comportamento muda conforme o modo
# de import do pytest e quebra de forma inconsistente entre máquinas.
pythonpath = .

testpaths = tests